name: CI techbridge-user
on:
  push:
    branches:
      - develop
      - release-*

jobs:
  ci:
    name: Tests & CodeQL & SonarCloud
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: 🛡️ Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-extended

      - name: ✅ Run Unit Test & Integration Test & Functional Test
        run: mvn -B verify

      - name: 🔍 CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      # Organización de la cuenta de Sonar: miw-upm-github
      - name: 🏷️ Prepare container image metadata, artifact from pom & Sonar Organization
        run: |
          echo "ORGANIZATION=jialewangxu" >> $GITHUB_ENV
          echo "PROJECTKEY=jialewangxu_techbridge-user" >> $GITHUB_ENV

      - name: 📊 Sonar Analysis
        run: >
          mvn -B sonar:sonar
          -Dsonar.projectKey=${{ env.PROJECTKEY }}
          -Dsonar.organization=${{ env.ORGANIZATION }}
          -Dsonar.host.url=https://sonarcloud.io 
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
