spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_ENDPOINT}:5432/user_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  security:
    oauth2:
      clients:
        issuer-uri: ${ISSUER-URI}
        spa-client-id: techbridge-spa
        spa-login-redirect-uri: ${LOGIN_URI}
        spa-logout-redirect-uri: ${LOGOUT_URI}
        api-client-id: ${API_CLIENT_ID}
        api-client-secret: ${API_CLIENT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER}:${EUREKA_PASSWORD}@techbridge-eureka:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false