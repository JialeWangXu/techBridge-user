<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activaci&oacute;n de cuenta - TechBridge</title>
    <link rel="stylesheet" th:href="@{/css/auth-pages.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-brand" aria-label="Activaci&oacute;n de cuenta">
        <div>
            <img th:src="@{/images/logo-clean.png}" alt="TechBridge" class="logo-image">

            <div class="brand-copy">
                <p class="section-label">Cuenta TechBridge</p>
                <h1>Activaci&oacute;n de cuenta</h1>
                <p>Hemos preparado esta pantalla con texto grande, buen contraste y acciones sencillas.</p>
            </div>
        </div>

        <div class="auth-visual">
            <img th:src="@{/images/personaje.png}" alt="" class="character-image">
        </div>
    </section>

    <section class="auth-panel" aria-label="Resultado de activaci&oacute;n">
        <div class="mobile-logo">
            <img th:src="@{/images/logo-clean.png}" alt="TechBridge" class="logo-image">
        </div>

        <span class="status-badge" th:text="${statusLabel}">Estado</span>

        <div class="auth-heading">
            <p class="section-label">TechBridge</p>
            <h2 th:text="${title}">Cuenta activada</h2>
            <p th:text="${message}">Mensaje de activaci&oacute;n.</p>
        </div>

        <form th:if="${showResendForm}" th:action="@{/users/activation-token}" method="post">
            <input type="hidden" name="token" th:value="${activationToken}">
            <button type="submit" class="primary-btn">Volver a enviar email de activaci&oacute;n</button>
        </form>

        <a th:if="${showLoginLink}" th:href="${@environment.getProperty('app.login-url', '/login')}" class="primary-link">
            Ir al inicio de sesi&oacute;n
        </a>
    </section>
</main>
</body>
</html>
