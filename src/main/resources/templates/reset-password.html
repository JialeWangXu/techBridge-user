<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contrase&ntilde;a - TechBridge</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f6f8fb;
        }

        .main-container {
            display: flex;
            width: 90%;
            max-width: 1100px;
            min-height: 620px;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        .left-side {
            flex: 1.2;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
        }

        .image-logo-container {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .logo-image {
            height: 50px;
            width: auto;
            object-fit: contain;
        }

        .welcome-text h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #333;
            line-height: 1.1;
        }

        .welcome-text h2 {
            font-size: 1.8rem;
            margin: 10px 0;
            color: #555;
            font-weight: 400;
        }

        .welcome-text p {
            color: #666;
            margin: 8px 0;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .image-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .character-image {
            max-height: 80%;
            max-width: 100%;
            object-fit: contain;
            transform: scale(0.7);
        }

        .right-side {
            flex: 1;
            background-color: #fdfdff;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .mobile-logo {
            display: none;
            justify-content: center;
            margin-bottom: 30px;
        }

        .right-side h3 {
            font-size: 2rem;
            margin: 0 0 18px 0;
            color: #333;
            line-height: 1.2;
        }

        .message {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.55;
            margin: 0 0 28px 0;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 18px 15px 10px 15px;
            border: none;
            border-radius: 12px;
            background-color: #F1F4FA;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: 2px solid #8EBFFB;
        }

        .input-group label {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
            transition: all 0.2s;
            pointer-events: none;
        }

        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: 10px;
            font-size: 0.75rem;
            color: #003366;
        }

        .primary-btn,
        .primary-link {
            display: block;
            box-sizing: border-box;
            width: 100%;
            padding: 16px;
            background-color: #8EBFFB;
            color: #003366;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(142, 191, 251, 0.4);
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
        }

        .primary-btn:hover,
        .primary-btn:focus,
        .primary-link:hover,
        .primary-link:focus {
            background-color: #7ab2f0;
            color: #002244;
            outline: 3px solid #003366;
            outline-offset: 2px;
        }

        .error-message {
            color: #842029;
            background-color: #f8d7da;
            border: 1px solid #f5c2c7;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 22px;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.45;
            text-align: center;
        }

        @media (max-width: 850px) {
            body {
                align-items: flex-start;
                padding: 20px 0;
            }

            .main-container {
                flex-direction: column;
                min-height: auto;
                width: 95%;
                max-width: 450px;
            }

            .left-side {
                display: none;
            }

            .right-side {
                padding: 40px 30px;
            }

            .mobile-logo {
                display: flex;
            }

            .mobile-logo .logo-image {
                height: 60px;
            }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="left-side">
        <div class="image-logo-container">
            <img th:src="@{/images/logo-clean.png}" alt="logo TechBridge" class="logo-image">
        </div>
        <div class="welcome-text">
            <h1>Cambiar contrase&ntilde;a</h1>
            <h2>TechBridge</h2>
            <p>Use una contrase&ntilde;a nueva para volver a acceder a su cuenta.</p>
        </div>
        <div class="image-container">
            <img th:src="@{/images/personaje.png}" alt="" class="character-image">
        </div>
    </div>

    <main class="right-side">
        <div class="mobile-logo">
            <img th:src="@{/images/logo-clean.png}" alt="logo TechBridge" class="logo-image">
        </div>

        <h3 th:text="${title}">Cambiar contrase&ntilde;a</h3>
        <p class="message" th:text="${message}">Escriba su nueva contrase&ntilde;a.</p>

        <div th:if="${showPasswordError}" class="error-message">
            Las contrase&ntilde;as no coinciden o el enlace no es v&aacute;lido. Vuelva a intentarlo.
        </div>

        <form th:if="${showForm}" th:action="@{/users/forget-password-token}" method="post">
            <input type="hidden" name="token" th:value="${token}">
            <div class="input-group">
                <input type="password" name="newPassword" id="newPassword" placeholder=" " required autofocus>
                <label for="newPassword">Nueva contrase&ntilde;a</label>
            </div>

            <div class="input-group">
                <input type="password" name="confirmPassword" id="confirmPassword" placeholder=" " required>
                <label for="confirmPassword">Confirmar contrase&ntilde;a</label>
            </div>

            <button type="submit" class="primary-btn">Cambiar contrase&ntilde;a</button>
        </form>

        <a th:if="${showLoginLink}" th:href="${@environment.getProperty('app.login-url', '/login')}" class="primary-link">
            Ir al inicio de sesi&oacute;n
        </a>
    </main>
</div>
</body>
</html>
