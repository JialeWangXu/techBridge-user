<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contrase&ntilde;a - TechBridge</title>
    <link rel="stylesheet" th:href="@{/css/auth-pages.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-brand" aria-label="Cambio de contrase&ntilde;a">
        <div>
            <img th:src="@{/images/logo-clean.png}" alt="TechBridge" class="logo-image">

            <div class="brand-copy">
                <p class="section-label">Seguridad</p>
                <h1>Cambiar contrase&ntilde;a</h1>
                <p>Use una contrase&ntilde;a nueva para volver a acceder a su cuenta de TechBridge.</p>
            </div>
        </div>

        <div class="auth-visual">
            <img th:src="@{/images/personaje.png}" alt="" class="character-image">
        </div>
    </section>

    <section class="auth-panel" aria-label="Formulario para cambiar contrase&ntilde;a">
        <div class="mobile-logo">
            <img th:src="@{/images/logo-clean.png}" alt="TechBridge" class="logo-image">
        </div>

        <div class="auth-heading">
            <p class="section-label">TechBridge</p>
            <h2 th:text="${title}">Cambiar contrase&ntilde;a</h2>
            <p th:text="${message}">Escriba su nueva contrase&ntilde;a.</p>
        </div>

        <div th:if="${showPasswordError}" class="alert-message alert-error" role="alert">
            Las contrase&ntilde;as no coinciden o el enlace no es v&aacute;lido. Vuelva a intentarlo.
        </div>

        <form th:if="${showForm}" th:action="@{/users/forget-password-token}" method="post">
            <input type="hidden" name="token" th:value="${token}">

            <div class="form-group">
                <label for="newPassword">Nueva contrase&ntilde;a</label>
                <input type="password" name="newPassword" id="newPassword" autocomplete="new-password" required autofocus>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar contrase&ntilde;a</label>
                <input type="password" name="confirmPassword" id="confirmPassword" autocomplete="new-password" required>
            </div>

            <button type="submit" class="primary-btn">Cambiar contrase&ntilde;a</button>
        </form>

        <a th:if="${showLoginLink}" th:href="${@environment.getProperty('app.login-url', '/login')}" class="primary-link">
            Ir al inicio de sesi&oacute;n
        </a>
    </section>
</main>
</body>
</html>
